  <!-- BACKEND -->
  <g>
    <rect x="64" y="538" width="440" height="152" rx="16" fill="#160d2b" stroke="#ff2d78" stroke-opacity=".7" stroke-width="1.8"/>
    <text x="88" y="572" font-size="17" font-weight="bold" fill="#fff" letter-spacing="2" font-family="'Space Grotesk',sans-serif">BACKEND — server.py</text>
    <text x="88" y="598" font-size="12.5" fill="#9088ad">python stdlib · threaded HTTP + SSE · systemd</text>
    <text x="88" y="626" font-size="13" fill="#c9bfe6">· /api/chat orchestrates ① ② ③ per turn</text>
    <text x="88" y="650" font-size="13" fill="#c9bfe6">· sessions · graph · stats · demo quota guard</text>
    <text x="88" y="674" font-size="13" fill="#c9bfe6">· 728 MB host · zero pip dependencies</text>
  </g>
  <path d="M284 690 L284 744" stroke="#ff2d78" stroke-width="2.4" marker-end="url(#aP)" filter="url(#soft)"/>
  <text x="300" y="722" font-size="12.5" fill="#9088ad">retrieve() · remember() · sleep_cycle()</text>

  <!-- ENGINE -->
  <g>
    <rect x="64" y="748" width="440" height="196" rx="16" fill="#160d2b" stroke="#ff2d78" stroke-opacity=".7" stroke-width="1.8"/>
    <text x="88" y="782" font-size="17" font-weight="bold" fill="#fff" letter-spacing="2" font-family="'Space Grotesk',sans-serif">MEMORY ENGINE — engine.py</text>
    <text x="88" y="810" font-size="13" fill="#ffd166">RETRIEVE  hybrid score under 800-tk budget</text>
    <text x="104" y="832" font-size="11.5" fill="#9088ad">.55·semantic + .18·recency + .17·importance + .10·usage</text>
    <text x="88" y="858" font-size="13" fill="#7ef2ff">REMEMBER  dedupe ≥.90 · arbitrate .45-.90</text>
    <text x="88" y="884" font-size="13" fill="#ff8ab5">SUPERSEDE contradicted beliefs (audit trail)</text>
    <text x="88" y="910" font-size="13" fill="#c9bfe6">SLEEP     union-find clusters ≥.58 → merge · forget</text>
    <text x="88" y="932" font-size="11.5" fill="#7a7295">every step transparent — scores streamed to the UI</text>
  </g>

  <!-- SQLITE -->
  <g>
    <rect x="580" y="748" width="380" height="196" rx="16" fill="#120b22" stroke="#22d3ee" stroke-opacity=".6" stroke-width="1.6"/>
    <text x="604" y="782" font-size="17" font-weight="bold" fill="#fff" letter-spacing="2" font-family="'Space Grotesk',sans-serif">DATABASE — SQLite</text>
    <text x="604" y="808" font-size="12.5" fill="#9088ad">WAL · /var/lib/engram/engram.db</text>
    <text x="604" y="836" font-size="13" fill="#c9bfe6">· memories: typed, scored, 256-d float32</text>
    <text x="604" y="860" font-size="13" fill="#c9bfe6">· lifecycle: active / superseded /</text>
    <text x="620" y="882" font-size="13" fill="#c9bfe6">consolidated / forgotten</text>
    <text x="604" y="906" font-size="13" fill="#c9bfe6">· sessions · messages · usage metering</text>
    <text x="604" y="930" font-size="11.5" fill="#7a7295">superseded_by / consolidated_into = audit trail</text>
  </g>
  <path d="M504 846 L580 846" stroke="#22d3ee" stroke-width="2.4" marker-end="url(#aC)" marker-start="url(#aC)" filter="url(#soft)"/>

