    <text x="1560" y="68" fill="#ffd166">①</text><text x="1583" y="68" fill="#c9bfe6">recall</text>
    <text x="1660" y="68" fill="#ff8ab5">②</text><text x="1683" y="68" fill="#c9bfe6">reason</text>
    <text x="1760" y="68" fill="#a78bfa">③</text><text x="1783" y="68" fill="#c9bfe6">memorize</text>
    <text x="1316" y="94" fill="#ffd166">④</text><text x="1339" y="94" fill="#c9bfe6">sleep cycle — consolidate + forget (on demand)</text>
  </g>

  <!-- ===================== left stack ===================== -->
  <!-- FRONTEND -->
  <g>
    <rect x="64" y="150" width="440" height="150" rx="16" fill="#120b22" stroke="#8b5cf6" stroke-opacity=".55" stroke-width="1.6"/>
