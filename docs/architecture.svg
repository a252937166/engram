  <!-- header -->
  <text x="64" y="74" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="10" font-family="'Space Grotesk',sans-serif">ENGRAM · ARCHITECTURE</text>
  <text x="64" y="102" font-size="13" fill="#9088ad" letter-spacing="4">HOW QWEN CLOUD CONNECTS TO THE FRONTEND, BACKEND AND DATABASE — TRACK 1 · MEMORYAGENT</text>
  <rect x="64" y="118" width="470" height="3" fill="url(#brand)"/>
  <g font-size="13" letter-spacing="2">
    <rect x="1290" y="46" width="252" height="34" rx="17" fill="rgba(255,45,120,.08)" stroke="rgba(255,45,120,.5)"/>
