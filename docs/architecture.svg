    <text x="88" y="238" font-size="13" fill="#c9bfe6">· chat with SSE streaming</text>
    <text x="88" y="262" font-size="13" fill="#c9bfe6">· live memory constellation (canvas)</text>
    <text x="88" y="286" font-size="13" fill="#c9bfe6">· per-recall score breakdown UI</text>
  </g>
