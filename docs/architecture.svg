    <text x="1420" y="304" font-size="11.5" fill="#7a7295">CONVERSATIONAL REASONING</text>
    <text x="1176" y="332" font-size="13" fill="#c9bfe6">· streams the answer over SSE (delta events)</text>
    <text x="1176" y="356" font-size="13" fill="#c9bfe6">· grounded on injected MEMORY block (~800 tk)</text>
    <text x="1176" y="380" font-size="13" fill="#c9bfe6">· short-term window stays small — long-term</text>
    <text x="1192" y="402" font-size="13" fill="#c9bfe6">knowledge arrives only through ENGRAM recall</text>
    <text x="1176" y="426" font-size="11.5" fill="#7a7295">temp 0.7 · max 1200 tk · retry/backoff</text>

    <!-- qwen3.6-flash -->
    <rect x="1152" y="464" width="672" height="212" rx="14" fill="#1a1132" stroke="#a78bfa" stroke-opacity=".55" stroke-width="1.6"/>
    <text x="1176" y="498" font-size="18" font-weight="bold" fill="#d8c9ff" font-family="'Space Grotesk',sans-serif">qwen3.6-flash</text>
    <text x="1420" y="498" font-size="11.5" fill="#7a7295">MEMORY OPERATIONS · JSON-ONLY · THINKING OFF</text>
    <text x="1176" y="526" font-size="13" fill="#c9bfe6">· EXTRACT: user turn → typed memories</text>
    <text x="1192" y="548" font-size="12" fill="#9088ad">{type: preference|semantic|procedural|episodic, importance}</text>
    <text x="1176" y="574" font-size="13" fill="#c9bfe6">· ARBITRATE: new vs neighbors →</text>
    <text x="1192" y="596" font-size="12" fill="#9088ad">duplicate_of → reinforce · replaces → supersede · distinct → insert</text>
    <text x="1176" y="622" font-size="13" fill="#c9bfe6">· CONSOLIDATE: cluster → one dense memory</text>
    <text x="1176" y="648" font-size="11.5" fill="#7a7295">temp 0.1 · defensive JSON parsing · fails open to "keep"</text>

    <!-- embedding -->
    <rect x="1152" y="700" width="672" height="164" rx="14" fill="#1a1132" stroke="#22d3ee" stroke-opacity=".55" stroke-width="1.6"/>
    <text x="1176" y="734" font-size="18" font-weight="bold" fill="#7ef2ff" font-family="'Space Grotesk',sans-serif">text-embedding-v4</text>
    <text x="1460" y="734" font-size="11.5" fill="#7a7295">256-D VECTOR SPACE</text>
    <text x="1176" y="762" font-size="13" fill="#c9bfe6">· embeds queries at recall time (①)</text>
    <text x="1176" y="786" font-size="13" fill="#c9bfe6">· embeds new memories before storage (③)</text>
    <text x="1176" y="810" font-size="13" fill="#c9bfe6">· powers dedupe, arbitration shortlist and</text>
    <text x="1192" y="832" font-size="13" fill="#c9bfe6">sleep-cycle clustering (cos ≥ .58, measured)</text>
    <text x="1176" y="856" font-size="11.5" fill="#7a7295">vectors stored in SQLite as float32 blobs</text>
  </g>

