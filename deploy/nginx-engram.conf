# ENGRAM - engram.axiqo.xyz
# HTTP server block; certbot --nginx adds the TLS twin and the 301 redirect.

limit_req_zone $binary_remote_addr zone=engram_api:10m rate=2r/s;

server {
    listen 80;
    server_name engram.axiqo.xyz;

    root /var/www/engram;
    index index.html;

    location = /api/chat {
        limit_req zone=engram_api burst=6 nodelay;
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_buffering off;          # SSE: flush chunks immediately
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        limit_req zone=engram_api burst=12 nodelay;
        proxy_pass http://127.0.0.1:8788;
        proxy_http_version 1.1;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
